name: Day04 Deploy
# Deploy the day-04 dbt bundle via GitHub OIDC (no stored credential secret).
#   push to main (touching the bundle) → deploy + run on DEV (automatic)
#   prod                                → same workflow, gated by the 'prod' GitHub Environment (required reviewers)
# Promotion is gated by environment approval — no release tags, no versioning.
# NOTE: GitHub only runs workflows from THIS path (repo-root .github/workflows/). The copy under
# day-04/.github/workflows/ is illustrative and does NOT run.
on:
  push:
    branches: [main]
    paths: ["day-04/dbt_olist_bundle/**"]   # only when the day-04 bundle changes
  workflow_dispatch:

permissions:
  id-token: write        # required for GitHub OIDC (workload identity federation)
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    concurrency: day04-dev
    defaults:
      run:
        working-directory: day-04/dbt_olist_bundle   # bundle path from the repo root
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      # Environment-scoped SECRETS — same names in every environment; resolved from `environment: dev`.
      DATABRICKS_HOST:      ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy dbt bundle (dev)
        run: databricks bundle deploy -t dev          # mode: production → runs as the OIDC SP
      - name: Run dbt job (dev)
        run: databricks bundle run dbt_olist_bundle_job -t dev

  deploy-prod:
    needs: deploy-dev      # promote only after dev succeeds
    runs-on: ubuntu-latest
    environment: prod      # add required reviewers on this GitHub Environment to gate prod
    concurrency: day04-prod
    defaults:
      run:
        working-directory: day-04/dbt_olist_bundle
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      # Same secret NAMES as dev — resolved from the 'prod' environment.
      DATABRICKS_HOST:      ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy dbt bundle (prod)
        run: databricks bundle deploy -t prod
      - name: Run dbt job (prod)
        run: databricks bundle run dbt_olist_bundle_job -t prod
